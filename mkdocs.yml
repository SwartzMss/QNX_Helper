site_name: QNX Helper
site_description: QNX 学习资料、实践记录与问题整理
site_url: https://swartzmss.github.io/QNX_Helper/
repo_url: https://github.com/SwartzMss/QNX_Helper
repo_name: QNX_Helper

theme:
  name: readthedocs

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - QNX 简介: getting-started/overview.md
  - QNX 和 Linux 的区别: getting-started/qnx-vs-linux.md
  - 环境搭建: getting-started/setup.md
  - 常用命令: commands/common-commands.md
  - 安全策略（secpol）: security/secpol.md
  - secpol 策略语言与示例: security/secpol-policy-example.md
  - Resource Manager 的 secpol 示例: security/secpol-resource-manager-example.md
  - secpol 排错与检查清单: security/secpol-troubleshooting.md
  - Crash 调试: debug/crash-debugging.md
