site_name: QNX Helper
site_description: QNX 学习资料、实践记录与问题整理
site_url: https://swartzmss.github.io/QNX_Helper/
repo_url: https://github.com/SwartzMss/QNX_Helper
repo_name: QNX_Helper

theme:
  name: readthedocs

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - QNX 简介: getting-started/overview.md
  - 环境搭建: getting-started/setup.md
  - 常用命令: commands/common-commands.md
